<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creature's Crypto</title>
<meta name="description" content="A running diary of learning about and investing in crypto; one short entry at a time.">

<!-- Fonts: Caudex for the masthead & dates, Literata for reading text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400&family=Literata:ital,opsz,wght@0,18..144,400;0,18..144,500;1,18..144,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <!-- Masthead -->
    <header class="masthead">
      <p class="masthead__eyebrow">a running notebook</p>
      <h1 class="masthead__title">Creature's Crypto</h1>
      <p class="masthead__tagline">Notes from learning crypto out loud; the mistakes, the small wins, and everything I'm still figuring out.</p>
    </header>

    <hr class="rule">

    <!-- Entries get rendered in here by script.js, using the data in entries.js -->
    <main id="entries" class="entries" aria-live="polite">
      <!-- JS fills this in -->
    </main>

    <footer class="footer">
      <p>Written a little at a time. Not financial advice — just one guy's notebook.</p>
    </footer>

  </div>

  <script src="entries.js"></script>
  <script src="script.js"></script>
</body>
</html>
